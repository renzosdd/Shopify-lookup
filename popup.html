<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shopify Admin Inspector</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; width: 360px; margin: 12px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
      button { padding: 8px 10px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 8px; }
      button:hover { background: #f6f6f6; }
      .small { font-size: 12px; color: #555; margin-bottom: 8px; }
      pre { white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #e7e7e7; padding: 10px; border-radius: 10px; max-height: 420px; overflow: auto; }
      a { color: #2563eb; }
      .pill { display: inline-block; padding: 2px 8px; border: 1px solid #ddd; border-radius: 999px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="small">
      <span class="pill" id="storePill">store: -</span>
      <span class="pill" id="verPill">api: -</span>
      <span style="float:right;"><a href="#" id="openOptions">Options</a></span>
    </div>

    <div class="row">
      <button id="ping">Test</button>
      <button id="webhooks">Webhooks</button>
      <button id="orders">Orders</button>
      <button id="customers">Customers</button>
      <button id="products">Products</button>
    </div>

    <pre id="out">Configura una store en Options y tocá "Test".</pre>

    <script type="module" src="popup.js"></script>
  </body>
</html>
