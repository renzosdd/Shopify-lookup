<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shopify Admin Inspector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { width: 410px; min-height: 520px; }
      .title-panel { background: linear-gradient(120deg, #ffffff, #f4f8ff); }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel title-panel">
        <div class="panel-body">
          <div class="header">
            <div>
              <h1 class="title">Shopify Admin Inspector</h1>
              <p class="subtle">Inspect API resources and payloads quickly.</p>
            </div>
            <button class="link-btn" id="openOptions" type="button">Options</button>
          </div>
          <div class="row" style="margin-top: 10px;">
            <span class="pill" id="storePill">store: -</span>
            <span class="pill" id="verPill">api: -</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <div class="action-grid">
            <button class="btn btn-primary" id="ping" type="button">Test</button>
            <button class="btn btn-tonal" id="webhooks" type="button">Webhooks</button>
            <button class="btn btn-tonal" id="orders" type="button">Orders</button>
            <button class="btn btn-tonal" id="customers" type="button">Customers</button>
            <button class="btn btn-tonal" id="products" type="button" style="grid-column: 1 / span 2;">Products</button>
          </div>
          <div class="tools" style="margin-top: 10px;">
            <button class="btn btn-ghost" id="viewPayload" type="button" disabled>View payload</button>
            <button class="btn btn-ghost" id="downloadPayload" type="button" disabled>Download payload</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <p class="subtle" id="payloadInfo">Payload preview</p>
          <pre class="mono-box" id="out">Configure a store in Options and run "Test".</pre>
        </div>
      </section>
    </div>

    <dialog class="dialog" id="payloadDialog">
      <div class="dialog-head">
        <h2 class="title" style="font-size: 15px; margin-bottom: 0;">Payload JSON</h2>
      </div>
      <div class="dialog-body">
        <pre class="mono-box" id="dialogOut" style="max-height: 60vh; min-height: 240px; margin: 0;"></pre>
      </div>
      <div class="dialog-foot">
        <button class="btn btn-ghost" id="dialogClose" type="button">Close</button>
        <button class="btn btn-primary" id="dialogDownload" type="button">Download JSON</button>
      </div>
    </dialog>

    <script type="module" src="popup.js"></script>
  </body>
</html>
