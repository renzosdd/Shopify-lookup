<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shopify Admin Inspector - Options</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { min-height: 100vh; }
      .app {
        max-width: 960px;
        margin: 0 auto;
        padding: 22px;
      }
      .title { font-size: 24px; }
      code {
        border-radius: 8px;
        border: 1px solid var(--md-outline);
        background: #f8faff;
        padding: 1px 6px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="panel" style="background: linear-gradient(120deg, #ffffff, #f4f8ff);">
        <div class="panel-body">
          <h1 class="title">Store Configuration</h1>
          <p class="subtle">
            Add your Shopify store (<code>my-store.myshopify.com</code>) and Admin API token from a Custom App.
            Calls are made directly from this extension (no backend).
          </p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <h2 class="title" style="font-size: 18px;">Add Store</h2>
          <div class="field-grid" style="margin-top: 12px;">
            <label class="field">
              <span class="label">Display name</span>
              <input class="input" id="name" placeholder="US Store" />
            </label>
            <label class="field">
              <span class="label">Shop domain</span>
              <input class="input" id="domain" placeholder="my-store.myshopify.com" />
            </label>
            <label class="field">
              <span class="label">Admin API access token</span>
              <input class="input" id="token" placeholder="shpat_..." type="password" autocomplete="off" />
            </label>
            <label class="field">
              <span class="label">API version</span>
              <input class="input" id="version" placeholder="2025-01 (default)" />
            </label>
          </div>
          <div class="row" style="margin-top: 12px;">
            <button class="btn btn-primary" id="add" type="button">Save store</button>
            <span class="hint">Recommended scopes: <code>read_orders</code>, <code>read_customers</code>, <code>read_products</code>, <code>read_webhooks</code>.</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body">
          <h2 class="title" style="font-size: 18px;">Configured Stores</h2>
          <p class="status" id="status"></p>
          <ul class="store-list" id="list"></ul>
        </div>
      </section>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
